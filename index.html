<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理成熟度测试 - 了解你的心理成熟水平</title>
  <meta name="description" content="基于心理学理论的专业心理成熟度在线测试，涵盖情绪管理、自我认知、责任感等八个维度，提供多维度雷达图分析和详细解读报告。">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- ==================== 首页 ==================== -->
    <section id="landing-section" class="section landing-section">
      <div class="landing-content">
        <div class="landing-icon">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle cx="40" cy="40" r="36" fill="none" stroke="#2C5F7C" stroke-width="2"/>
            <circle cx="40" cy="28" r="8" fill="#2C5F7C" opacity="0.9"/>
            <path d="M20 65 Q40 42 60 65" fill="none" stroke="#2C5F7C" stroke-width="2" stroke-linecap="round"/>
            <circle cx="40" cy="40" r="3" fill="#C4935A"/>
          </svg>
        </div>
        <h1 class="landing-title">心理成熟度测试</h1>
        <p class="landing-subtitle">
          基于 Kegan 成人发展理论、Loevinger 自我发展模型及中国成年人心理成熟度量表，<br>
          从<span class="highlight">八个核心维度</span>全面评估你的心理成熟水平。
        </p>
        <div class="feature-cards">
          <div class="feature-card">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="10" fill="none" stroke="#2C5F7C" stroke-width="1.5"/><path d="M12 6v6l4 2" fill="none" stroke="#2C5F7C" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <h3>50 道精心设计</h3>
            <p>自评量表 + 情境选择题，<br>约 8-12 分钟完成</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="none" stroke="#2C5F7C" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </div>
            <h3>八维雷达分析</h3>
            <p>情绪、认知、人际等<br>多维度可视化报告</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" width="28" height="28"><rect x="3" y="3" width="7" height="8" rx="1" fill="none" stroke="#2C5F7C" stroke-width="1.5"/><rect x="14" y="3" width="7" height="5" rx="1" fill="none" stroke="#2C5F7C" stroke-width="1.5"/><rect x="3" y="15" width="7" height="6" rx="1" fill="none" stroke="#2C5F7C" stroke-width="1.5"/><rect x="14" y="12" width="7" height="9" rx="1" fill="none" stroke="#2C5F7C" stroke-width="1.5"/></svg>
            </div>
            <h3>深度解读报告</h3>
            <p>每个维度的详细分析<br>与个性化成长建议</p>
          </div>
        </div>
        <button id="start-btn" class="btn-primary" onclick="startTest()">开始测试</button>
      </div>
    </section>

    <!-- ==================== 答题页 ==================== -->
    <section id="test-section" class="section test-section" style="display:none;">
      <div class="test-container">
        <!-- 进度条 -->
        <div class="progress-wrapper">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-text" id="progress-text">1 / 50</span>
        </div>

        <!-- 题目类型指示 -->
        <div class="question-type-badge" id="question-type-badge"></div>

        <!-- 题目卡片 -->
        <div class="question-card" id="question-card">
          <div class="question-number" id="question-number"></div>
          <div class="question-text" id="question-text"></div>
          <div class="question-dimension" id="question-dimension"></div>
          <div class="options-container" id="options-container"></div>
        </div>

        <!-- 导航按钮 -->
        <div class="nav-buttons">
          <button id="prev-btn" class="btn-nav" onclick="prevQuestion()" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            上一题
          </button>
          <button id="next-btn" class="btn-nav" onclick="nextQuestion()">
            下一题
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 18l6-6-6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <!-- 题目导航网格 -->
        <div class="question-nav-grid" id="question-nav-grid"></div>
      </div>
    </section>

    <!-- ==================== 结果页 ==================== -->
    <section id="results-section" class="section results-section" style="display:none;">
      <div class="results-container">

        <!-- 结果头部 -->
        <div class="results-header">
          <div class="maturity-badge" id="maturity-badge"></div>
          <h1 class="results-title">你的心理成熟度报告</h1>
          <p class="results-level" id="results-level"></p>
          <p class="results-summary" id="results-summary"></p>
        </div>

        <!-- 综合评分卡片 -->
        <div class="score-cards" id="score-cards"></div>

        <!-- 雷达图 -->
        <div class="chart-section">
          <h2 class="chart-title">八维成熟度雷达图</h2>
          <div class="chart-container" id="radar-chart"></div>
        </div>

        <!-- 柱状图 -->
        <div class="chart-section">
          <h2 class="chart-title">维度得分对比</h2>
          <div class="chart-container" id="bar-chart"></div>
        </div>

        <!-- 维度详细解读 -->
        <div class="analysis-section">
          <h2 class="chart-title">各维度详细解读</h2>
          <div class="dimension-analysis-list" id="dimension-analysis-list"></div>
        </div>

        <!-- 综合建议 -->
        <div class="advice-section" id="advice-section"></div>

        <!-- 操作按钮 -->
        <div class="results-actions">
          <button class="btn-primary" onclick="restartTest()">重新测试</button>
          <button class="btn-secondary" onclick="window.print()">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            打印报告
          </button>
        </div>

        <!-- 声明 -->
        <p class="disclaimer">本测试仅供自我探索和参考，不构成心理学诊断。如需专业帮助，请咨询有资质的心理健康专业人士。</p>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
